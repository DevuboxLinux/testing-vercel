<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MegaOke Web MIDI Ripper</title>
</head>
<body>
  <h2>Decrypt MegaOke MIDI File from Song ID</h2>

  <input type="text" id="idInput" placeholder="Find the Song ID in MegaOke Web and paste here..." style="width: 400px;" />
  <a href="https://example.com">
  <button>Open MegaOke Web</button>
  </a>
  <button id="btn">Fetch MIDI and Decyrpt</button>

  <p id="status"></p>

  <!-- Pako -->
  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>

  <script>
    const idInput = document.getElementById("idInput");
    const status = document.getElementById("status");
    const btn = document.getElementById("btn");

    const BASE_URL = "https://tyfmegaoke.com/api/play/";

    btn.addEventListener("click", async () => {
      const id = idInput.value.trim();

      if (!id) {
        status.textContent = "Please enter a Song ID.";
        return;
      }

      const url = BASE_URL + encodeURIComponent(id);

      status.textContent = "Fetching: " + url;

      try {
        const res = await fetch(url);

        if (!res.ok) {
          throw new Error("HTTP error " + res.status);
        }

        const compressed = new Uint8Array(await res.arrayBuffer());

        status.textContent = "Decrypting...";

        const decompressed = pako.inflateRaw(compressed);

        status.textContent = "Preparing download...";

        const blob = new Blob([decompressed]);
        const blobUrl = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = blobUrl;

        const outName = id + ".mid";
        a.download = outName;

        document.body.appendChild(a);
        a.click();
        a.remove();

        URL.revokeObjectURL(blobUrl);

        status.textContent = "Done!";
      } catch (err) {
        console.error(err);
        status.textContent = "Error: " + err.message;
      }
    });
  </script>
</body>
</html>
